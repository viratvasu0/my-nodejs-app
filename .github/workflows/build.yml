name: SonarCloud Scan

on:
  push:
    branches:
      - main
      - master

  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
