name: Build Push and Tag (CST)

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Generate CST-based tag (DD-MM-YYYY-HHMMSS)
      - name: Generate CST tag
        id: tag
        run: |
          TAG=$(TZ="America/Chicago" date +"%d-%m-%Y-%H%M")
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/${{ github.repository }}:${{ env.TAG }} .

      - name: Push Docker image
        run: |
          docker push $REGISTRY/${{ github.repository }}:${{ env.TAG }}

      - name: Tag as latest
        run: |
          docker tag $REGISTRY/${{ github.repository }}:${{ env.TAG }} $REGISTRY/${{ github.repository }}:latest
          docker push $REGISTRY/${{ github.repository }}:latest

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create Git tag
        run: |
          git tag -a "${{ env.TAG }}" -m "Auto tag ${{ env.TAG }}"
          git push origin "${{ env.TAG }}"
