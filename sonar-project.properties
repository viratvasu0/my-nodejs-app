sonar.projectKey=viratvasu0_my-nodejs-app
sonar.projectName=my-nodejs-app
sonar.projectVersion=1.0.0

###########################################################
# Source Layout Structure
###########################################################

# No source code folders found at root. Needs manual review by Devs.
sonar.sources=.
sonar.test.inclusions=**/*.spec.js,**/*.spec.ts,**/*.test.js,**/*.test.ts,**/test/**/*.js
sonar.python.version=3.11

###########################################################
# Enterprise Analysis Exclusions
###########################################################

sonar.exclusions=**/*.d.ts,**/*.pyc,**/coverage/**,**/migrations/**,CHANGELOG/**
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/test_*.py,**/tests/**,src/app/mocks/****,src/environments/*,src/test.ts
sonar.cpd.exclusions=**/*.generated.*,**/generated/**,**/*.test.ts,**/*.spec.ts

###########################################################
# SCM Tracking Control
###########################################################

sonar.scm.provider=git
sonar.scm.forceReloadAll=true

###########################################################
# Platform Quality Gates Config
###########################################################

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=1800
